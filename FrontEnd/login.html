<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Sophie Bluel - Architecte d'intérieur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans&display=swap"
      rel="stylesheet"
    />
    <meta name="description" content="" />
    <link rel="stylesheet" href="./assets/login-style.css" />
  </head>
  <body>
    <header>
      <h1>Sophie Bluel <span>Architecte d'intérieur</span></h1>
      <nav>
        <ul>
          <a href="index.html">projets</a>
          <a href="#">contact</a>
          <a class="login" href="login.html">login</a>
          <a class="logout hidden" href="#">logout</a>
          <img src="./assets/icons/instagram.png" alt="Instagram" />
        </ul>
      </nav>
    </header>

    <main>
      <form id="login">
        <h2>Log in</h2>
        <div class="wrapper">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" />
        </div>
        <div class="wrapper">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" autocomplete="current-password" />
        </div>
        <input type="submit" id="login-submit" value="Se connecter" />
        <div id="login-error" class="error hidden"></div>
        <a>Mot de passe oublié</a>
      </form>
    </main>

    <footer>
      <nav>
        <ul>
          <li>Mentions Légales</li>
        </ul>
      </nav>
    </footer>
    <script src="./scripts/config.js"></script>
    <script src="./scripts/login.js"></script>
    <script src="./scripts/ui.js"></script>
  </body>
</html>
